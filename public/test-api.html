<!DOCTYPE html>
<html>
<head>
    <title>Test API Endpoints</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Test API Endpoints</h1>
    
    <button onclick="testAllEndpoints()">🔄 Test All Endpoints</button>
    
    <div id="results"></div>
    
    <script>
        async function testEndpoint(name, url, options = {}) {
            const resultDiv = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = 'test';
            testDiv.innerHTML = `<h3>${name}</h3><p>Testing ${url}...</p>`;
            resultDiv.appendChild(testDiv);
            
            try {
                const response = await fetch(url, options);
                const text = await response.text();
                let json;
                try {
                    json = JSON.parse(text);
                } catch {
                    json = null;
                }
                
                testDiv.className = 'test ' + (response.ok ? 'success' : 'error');
                testDiv.innerHTML = `
                    <h3>${name}</h3>
                    <p><strong>URL:</strong> ${url}</p>
                    <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                    <pre>${json ? JSON.stringify(json, null, 2) : text}</pre>
                `;
            } catch (error) {
                testDiv.className = 'test error';
                testDiv.innerHTML = `
                    <h3>${name}</h3>
                    <p><strong>URL:</strong> ${url}</p>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }
        
        async function testAllEndpoints() {
            document.getElementById('results').innerHTML = '';
            
            // Test GET endpoints
            await testEndpoint('GET /api/test', '/api/test');
            await testEndpoint('GET /api/configurations/health', '/api/configurations/health');
            
            // Test POST configurations/submit
            await testEndpoint('POST /api/configurations/submit', '/api/configurations/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    leadId: 'LEAD-TEST-00001',
                    nome: 'Test',
                    cognome: 'User'
                })
            });
        }
        
        // Auto-test on load
        window.addEventListener('load', testAllEndpoints);
    </script>
</body>
</html>
